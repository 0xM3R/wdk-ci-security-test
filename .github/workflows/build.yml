name: cache-poison-test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node 22.19.0
        uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Check for poison marker BEFORE install
        run: |
          echo "=== CACHE POISON BOUNDARY TEST ==="
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo "Actor: $GITHUB_ACTOR"
          echo ""
          echo "--- Checking npm cache for poison marker ---"
          NPM_CACHE=$(npm config get cache)
          echo "npm cache dir: $NPM_CACHE"
          if [ -f "$NPM_CACHE/_poison_marker" ]; then
            echo "POISON MARKER FOUND: $(cat $NPM_CACHE/_poison_marker)"
          else
            echo "POISON MARKER: not found (clean cache)"
          fi
          echo "=== END PRE-CHECK ==="

      - name: Install dependencies
        run: npm clean-install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Write poison marker to npm cache
        if: github.event_name == 'pull_request'
        run: |
          NPM_CACHE=$(npm config get cache)
          echo "POISONED by $GITHUB_ACTOR via $GITHUB_REF at $(date -u)" > "$NPM_CACHE/_poison_marker"
          echo "=== WROTE POISON MARKER ==="
          cat "$NPM_CACHE/_poison_marker"
          echo "Cache will be saved by actions/setup-node post step"

      - name: Run preinstall probe
        run: node preinstall.js

      - name: Run tests
        run: npm test
